    databaseURL: "https://les-ecuries-des-marais-default-rtdb.europe-west1.firebasedatabase.app",

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --mg:#E5007D;--mg2:#ff3fa0;--mg-bg:#1a0010;--mg-border:#3d0025;
  --vi:#7B2FBE;
  --bg:#08080f;--bg2:#0f0f1a;--bg3:#161625;--bg4:#1e1e30;--bg5:#262640;
  --border:#ffffff08;--border2:#ffffff14;--border3:#ffffff22;
  --text:#f0eeff;--text2:#9090b8;--text3:#505070;
  --green:#00d68f;--green-bg:#001a0f;
  --amber:#ffb020;--amber-bg:#1a1000;
  --red:#ff4567;--red-bg:#1a0010;
  --blue:#4fc3f7;--blue-bg:#001a2a;
  --r:10px;--rl:16px;--rxl:22px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;overflow:hidden;}
.app{display:flex;height:100vh;}

.sidebar{width:252px;min-width:252px;background:var(--bg2);border-right:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden;}
.logo{padding:16px 16px 12px;border-bottom:1px solid var(--border2);}
.logo-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.logo-icon{width:32px;height:32px;background:var(--mg);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.logo-name{font-size:13px;font-weight:800;letter-spacing:-0.02em;line-height:1.2;}
.logo-sub{font-size:10px;color:var(--mg);font-weight:700;letter-spacing:0.04em;margin-top:1px;}

.nav{padding:10px;flex:1;overflow-y:auto;}
.nav-sec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);padding:10px 10px 5px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:var(--text2);transition:all 0.15s;font-size:13px;font-weight:600;margin-bottom:2px;border:1px solid transparent;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--mg-bg);color:var(--mg);border-color:var(--mg-border);}
.nav-item .ni{font-size:15px;width:20px;text-align:center;}
.nbadge{margin-left:auto;background:var(--mg);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;font-family:'Inconsolata',monospace;}
.sidebar-bot{padding:12px;border-top:1px solid var(--border2);}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{padding:13px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:12px;background:var(--bg2);flex-shrink:0;}
.topbar h1{font-size:17px;font-weight:800;flex:1;letter-spacing:-0.03em;}
.panel{flex:1;overflow-y:auto;padding:20px;}

.btn{padding:8px 16px;border-radius:10px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-weight:700;transition:all 0.15s;border:none;font-family:'Syne',sans-serif;}
.btn-mg{background:var(--mg);color:#fff;}
.btn-mg:hover{background:var(--mg2);}
.btn-sec{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);}
.btn-sec:hover{background:var(--bg4);color:var(--text);}
.btn-ghost{background:transparent;color:var(--text2);}
.btn-ghost:hover{background:var(--bg3);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #3a0015;}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid #003020;}
.btn-amber{background:var(--amber-bg);color:var(--amber);border:1px solid #3a2000;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-xs{padding:4px 9px;font-size:11px;}

.jour-tabs{display:flex;gap:5px;padding:12px 20px;border-bottom:1px solid var(--border2);background:var(--bg2);flex-wrap:wrap;flex-shrink:0;}
.jour-tab{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:var(--bg3);transition:all 0.15s;display:flex;align-items:center;gap:5px;}
.jour-tab:hover{border-color:var(--border3);color:var(--text);}
.jour-tab.active{background:var(--mg);color:#fff;border-color:var(--mg);}
.jour-tab .jt-c{font-size:9px;background:rgba(255,255,255,0.2);padding:1px 5px;border-radius:99px;}

/* COURS CARDS */
.cours-list{display:flex;flex-direction:column;gap:12px;}
.cours-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);overflow:hidden;}
.cours-header{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;background:var(--bg3);border-bottom:1px solid var(--border);}
.cours-header:hover{background:var(--bg4);}
.ctb{background:var(--mg-bg);border:1px solid var(--mg-border);border-radius:8px;padding:7px 11px;text-align:center;flex-shrink:0;}
.ctb-h{font-size:14px;font-weight:800;color:var(--mg);font-family:'Inconsolata',monospace;line-height:1;}
.ctb-d{font-size:9px;color:var(--mg);opacity:0.7;text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}
.cours-meta{flex:1;}
.cours-niv{font-size:14px;font-weight:800;letter-spacing:-0.02em;margin-bottom:2px;}
.cours-details{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cours-chip{font-size:11px;color:var(--text2);}
.expand-btn{width:26px;height:26px;border-radius:7px;background:var(--bg5);border:none;cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center;font-size:14px;}
.cours-card.expanded .expand-btn{background:var(--mg-bg);color:var(--mg);}

/* CAVALIERS SECTION */
.cav-section{padding:14px 16px;}
.cav-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.cav-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--border);margin-bottom:6px;}
.cav-row.absent{opacity:0.45;border-style:dashed;}
.cav-num{width:22px;height:22px;border-radius:5px;background:var(--bg5);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text3);flex-shrink:0;font-family:'Inconsolata',monospace;}
.cav-name-edit{flex:1;font-size:13px;font-weight:700;background:transparent;border:none;color:var(--text);font-family:'Syne',sans-serif;outline:none;min-width:0;}
.cav-name-edit:focus{color:var(--mg);}
.cav-name-edit::placeholder{color:var(--text3);font-weight:400;}
.ch-sel{background:var(--bg4);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;padding:5px 8px;cursor:pointer;outline:none;max-width:150px;}
.ch-sel:focus{border-color:var(--mg);}
.ch-sel.assigned{border-color:var(--mg-border);color:var(--mg);background:var(--mg-bg);}
.absent-btn{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid var(--border2);color:var(--text3);background:transparent;transition:all 0.15s;font-family:'Syne',sans-serif;}
.absent-btn:hover{border-color:var(--amber);color:var(--amber);}
.absent-btn.is-absent{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}
.cav-del{width:24px;height:24px;border-radius:6px;background:transparent;border:none;cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.cav-del:hover{background:var(--red-bg);color:var(--red);}
.add-cav-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1.5px dashed var(--border2);border-radius:var(--r);cursor:pointer;color:var(--text3);transition:all 0.15s;font-size:12px;font-weight:600;}
.add-cav-row:hover{border-color:var(--mg);color:var(--mg);background:var(--mg-bg);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px;}
.stat{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:13px 15px;position:relative;overflow:hidden;}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc,var(--mg));}
.stat-v{font-size:24px;font-weight:800;font-family:'Inconsolata',monospace;line-height:1;margin-bottom:3px;}
.stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;font-weight:700;}
.hrs-bar{height:5px;background:var(--bg5);border-radius:99px;overflow:hidden;margin-top:5px;}
.hrs-fill{height:100%;background:var(--mg);border-radius:99px;}

/* CHEVAUX */
.ch-list-item{display:flex;align-items:center;gap:12px;padding:11px 13px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:7px;cursor:pointer;transition:all 0.15s;}
.ch-list-item:hover{border-color:var(--border3);}
.ch-info{flex:1;}
.ch-name{font-size:13px;font-weight:800;letter-spacing:-0.02em;}
.ch-meta{font-size:11px;color:var(--text2);margin-top:2px;font-family:'Inconsolata',monospace;}
.ch-jours{font-size:10px;color:var(--text3);margin-top:3px;}

/* ── MONTOIR ── */
.montoir-day-tabs{display:flex;gap:5px;padding:10px 18px;border-bottom:1px solid var(--border2);background:var(--bg2);flex-wrap:wrap;flex-shrink:0;}
.m-day-tab{padding:6px 13px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border2);color:var(--text2);background:var(--bg3);transition:all 0.15s;}
.m-day-tab:hover{border-color:var(--border3);color:var(--text);}
.m-day-tab.active{background:var(--mg);color:#fff;border-color:var(--mg);}
.montoir-scroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;}
.mt{border-collapse:collapse;table-layout:fixed;}
.mt th,.mt td{border:1px solid var(--border2);}
.mt-corner{width:80px;min-width:80px;background:var(--bg3);padding:6px 8px;font-size:8px;font-weight:700;text-transform:uppercase;color:var(--text3);text-align:center;position:sticky;top:0;left:0;z-index:20;border-right:2px solid var(--border2)!important;}
.mt-heure{background:var(--bg3);padding:6px 4px;text-align:center;font-size:10px;font-family:'Inconsolata',monospace;font-weight:600;color:var(--text3);position:sticky;top:0;z-index:10;min-width:80px;white-space:nowrap;}
.mt-heure.has-cours{background:var(--mg-bg);color:var(--mg);border-bottom:2px solid var(--mg)!important;}
.mt-cheval{background:var(--bg2);padding:5px 7px;position:sticky;left:0;z-index:5;width:80px;min-width:80px;border-right:2px solid var(--border2)!important;vertical-align:middle;}
.mt-cheval .cn{font-size:10px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mt-cheval .ch{font-size:9px;font-family:'Inconsolata',monospace;font-weight:700;padding:1px 5px;border-radius:4px;display:inline-block;margin-top:2px;}
.mt-cell{padding:2px 3px;background:var(--bg);min-width:80px;vertical-align:top;transition:background 0.1s;}
.mt-cell.actif{background:var(--bg3);}
.m-cb{border-radius:5px;padding:4px 5px;font-size:9px;font-weight:700;border:1px solid transparent;margin-bottom:2px;}
.m-cb-niv{font-size:7px;text-transform:uppercase;letter-spacing:0.06em;opacity:0.75;margin-bottom:2px;}
.m-cb-mon{font-size:7px;opacity:0.55;margin-top:1px;}
/* chips — compacts sur mobile */
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;cursor:grab;border:1px solid var(--border2);color:var(--text);background:var(--bg5);transition:border-color 0.12s;margin:1px;user-select:none;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;touch-action:none;}
.chip:hover{border-color:var(--mg);color:var(--mg);}
.chip:active{cursor:grabbing;}
.chip.no-horse{border-color:var(--amber)!important;color:var(--amber)!important;background:var(--amber-bg)!important;}
.chip.has-horse{border-color:#005530!important;color:var(--green)!important;background:var(--green-bg)!important;}
.chip.absent{border-color:var(--text3)!important;color:var(--text3)!important;background:var(--bg4)!important;cursor:default;text-decoration:line-through;}
.mt-cell.drag-over{background:var(--mg-bg)!important;outline:2px dashed var(--mg);outline-offset:-2px;}

/* PIN OVERLAY */
.pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
.pin-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rxl);padding:32px;width:360px;text-align:center;}
.pin-box h2{font-size:20px;font-weight:800;margin-bottom:6px;}
.pin-box p{font-size:13px;color:var(--text2);margin-bottom:22px;}
.pin-input{width:100%;padding:12px 16px;font-size:16px;border:1px solid var(--border2);border-radius:10px;background:var(--bg3);color:var(--text);font-family:'Syne',sans-serif;outline:none;text-align:center;letter-spacing:0.1em;margin-bottom:12px;}
.pin-input:focus{border-color:var(--mg);}
.pin-error{color:var(--red);font-size:12px;margin-bottom:12px;min-height:18px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rxl);padding:24px;width:460px;max-width:96vw;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:17px;font-weight:800;margin-bottom:16px;}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border2);}

/* INPUTS */
input[type=text],input[type=number],input[type=password],select,textarea{width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border2);border-radius:9px;background:var(--bg3);color:var(--text);font-family:'Syne',sans-serif;outline:none;transition:border-color 0.15s;}
input:focus,select:focus{border-color:var(--mg);}
select option{background:var(--bg3);}
.fg{margin-bottom:12px;}
.fl{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:0.05em;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* CAVALIER VIEW */
.mon-cours-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rl);padding:16px;margin-bottom:10px;}
.mcc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.mcc-badge{background:var(--mg-bg);border:1px solid var(--mg-border);border-radius:9px;padding:9px 12px;text-align:center;flex-shrink:0;}
.mcc-bj{font-size:9px;font-weight:700;color:var(--mg);text-transform:uppercase;letter-spacing:0.06em;}
.mcc-bh{font-size:15px;font-weight:800;color:var(--mg);font-family:'Inconsolata',monospace;line-height:1.1;}
.mcc-titre{font-size:15px;font-weight:800;letter-spacing:-0.02em;margin-bottom:2px;}
.mcc-sub{font-size:12px;color:var(--text2);}
.horse-big{display:flex;align-items:center;gap:12px;background:var(--bg4);border-radius:11px;padding:13px 15px;border:1px solid var(--border2);}
.horse-big-icon{font-size:32px;}
.horse-big-name{font-size:20px;font-weight:800;color:var(--mg);letter-spacing:-0.03em;}
.horse-big-sub{font-size:11px;color:var(--text3);margin-top:2px;}

.toast{position:fixed;bottom:22px;right:22px;background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:11px 16px;border-radius:var(--r);font-size:13px;z-index:300;opacity:0;transform:translateY(10px);transition:all 0.25s;pointer-events:none;font-weight:600;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:4px;}
.tag{padding:2px 7px;border-radius:4px;font-size:10px;font-family:'Inconsolata',monospace;font-weight:600;background:var(--bg4);color:var(--text3);}
.badge{padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;font-family:'Inconsolata',monospace;}
.badge-mg{background:var(--mg-bg);color:var(--mg);border:1px solid var(--mg-border);}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-gray{background:var(--bg4);color:var(--text2);}
.shd{font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;letter-spacing:-0.02em;}
.divider{height:1px;background:var(--border2);margin:16px 0;}
.empty{text-align:center;padding:50px 20px;color:var(--text3);}
.empty .ei{font-size:38px;margin-bottom:12px;}
.empty p{font-size:13px;color:var(--text2);line-height:1.6;}

/* PRINT */
@media print{
  @page{size:A4 landscape;margin:6mm;}
  .no-print{display:none!important;}
  body,html{background:#fff!important;color:#000!important;overflow:visible!important;height:auto!important;font-size:7px!important;}
  .app{display:block!important;height:auto!important;}
  .sidebar,.topbar,.jour-tabs,.montoir-day-tabs,.montoir-legend{display:none!important;}
  .main{display:block!important;width:100%!important;}
  #main-panel{overflow:visible!important;display:block!important;height:auto!important;}
  #montoir-scroll{overflow:visible!important;height:auto!important;}
  .mt{width:100%!important;font-size:6.5px!important;}
  .mt th,.mt td{border:0.5px solid #bbb!important;padding:2px 3px!important;}
  .mt-corner{width:60px!important;min-width:60px!important;background:#f5f5f5!important;color:#333!important;position:static!important;font-size:6px!important;}
  .mt-heure{background:#f5f5f5!important;color:#333!important;position:static!important;font-size:6px!important;min-width:0!important;white-space:nowrap!important;}
  .mt-heure.has-cours{background:#fce4f1!important;color:#a0005a!important;}
  .mt-cheval{background:#fff!important;color:#000!important;position:static!important;width:60px!important;min-width:60px!important;font-size:6.5px!important;}
  .mt-cheval .cn{font-size:6.5px!important;white-space:normal!important;}
  .mt-cheval .ch{font-size:5.5px!important;padding:0 3px!important;}
  .mt-cell{background:#fff!important;min-width:0!important;min-height:0!important;padding:1px 2px!important;}
  .mt-cell.actif{background:#fafafa!important;}
  .m-cb{padding:2px 3px!important;border:0.5px solid #ddd!important;margin-bottom:1px!important;border-radius:3px!important;}
  .m-cb-niv{font-size:5px!important;margin-bottom:1px!important;}
  .m-cb-mon{font-size:5px!important;}
  .chip{font-size:5.5px!important;padding:1px 4px!important;margin:1px 0!important;border-radius:3px!important;display:block!important;white-space:normal!important;max-width:none!important;}
  .chip.has-horse{background:#e8f8f0!important;color:#006633!important;border-color:#aaddcc!important;}
  .chip.no-horse{background:#fff8e0!important;color:#996600!important;border-color:#ddcc88!important;}
  .chip.absent{background:#eee!important;color:#999!important;border-color:#ccc!important;}
  .print-header{display:block!important;margin-bottom:4mm!important;}
  .print-header h2{font-size:11px!important;color:#E5007D!important;}
  .print-header p{font-size:8px!important;color:#555!important;}
}
.print-header{display:none;padding:12px 0;margin-bottom:12px;border-bottom:2px solid #E5007D;}
.print-header h2{font-size:18px;font-weight:800;color:#E5007D;}
.print-header p{font-size:13px;color:#555;margin-top:4px;}

@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

<body>

<!-- PIN OVERLAY -->
<div class="pin-overlay" id="pin-overlay" style="display:none;">
  <div class="pin-box">
    <div style="font-size:40px;margin-bottom:12px;">🔐</div>
    <h2>Espace Monitrice</h2>
    <p>Entre le mot de passe pour accéder à la gestion</p>
    <input type="password" class="pin-input" id="pin-input" placeholder="Mot de passe..." onkeydown="if(event.key==='Enter')checkPin()">
    <div class="pin-error" id="pin-error"></div>
    <button class="btn btn-mg" style="width:100%;justify-content:center;" onclick="checkPin()">Accéder →</button>
    <button class="btn btn-ghost btn-sm" style="margin-top:8px;width:100%;justify-content:center;" onclick="cancelPin()">Annuler</button>
  </div>
</div>

<div class="app">
<div class="sidebar no-print">
  <div class="logo">
    <div class="logo-top">
      <div class="logo-icon">🐴</div>
      <div><div class="logo-name">Écuries des Marais</div><div class="logo-sub">Planning 2026/2027</div></div>
    </div>
  </div>
  <div class="nav" id="nav-wrap">
    <!-- rempli par JS selon mode -->
  </div>
  <div class="sidebar-bot" id="cav-picker-wrap" style="display:none;">
    <div class="fl" style="margin-bottom:5px;">Je suis...</div>
    <select id="cav-picker" onchange="selectedCavId=this.value;render()">
      <option value="">Sélectionner mon nom</option>
    </select>
  </div>
</div>

<div class="main">
  <div class="topbar no-print"><h1 id="page-title">Planning</h1><div id="topbar-actions" style="display:flex;gap:8px;"></div><span id="conn-status" style="font-size:10px;font-weight:700;color:var(--text3);flex-shrink:0;"></span></div>
  <div id="jour-tabs-wrap" class="no-print"></div>
  <div id="main-panel" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;"></div>
</div>
</div>

<div class="modal-bg" id="modal-bg"><div class="modal"><h3 id="m-title"></h3><div id="m-body"></div><div class="mfooter" id="m-footer"></div></div></div>
<div class="toast" id="toast"></div>

<script>
const KEY = 'ecuries_planning_v3';
const MOT_DE_PASSE = 'ecuries2025'; // modifiable ici

const JOURS = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const SLOTS = ['8h00','8h30','9h00','9h30','10h00','10h30','11h00','11h30','12h00','12h30','13h00','13h30','14h00','14h30','15h00','15h30','16h00','16h30','17h00','17h30','18h00','18h30','19h00','19h30','20h00','20h30'];
const DUREES = ['30min','1h','1h30','2h'];
const MONITRICES = ['Cassandra','Dorothée','Emily','—'];
const NIVEAUX = [
  {id:'deb',label:'Débutant'},{id:'g1',label:'Galop 1'},{id:'g12',label:'Galop 1/2'},
  {id:'g2',label:'Galop 2'},{id:'g23',label:'Galop 2/3'},{id:'g3',label:'Galop 3'},
  {id:'g34',label:'Galop 3/4'},{id:'g4',label:'Galop 4'},{id:'g45',label:'Galop 4/5'},
  {id:'g5',label:'Galop 5'},{id:'adtdeb',label:'Adulte Déb/G1'},{id:'adtg23',label:'Adulte G2/3'},
  {id:'adtg34',label:'Adulte G3/4'},{id:'adtg345',label:'Adulte G3/4/5'},
  {id:'adtg45',label:'Adulte G4/5'},{id:'cp',label:'Cours Particulier'},
];
const NIV_COLORS = {
  deb:'#6fcf97',g1:'#a78bfa',g12:'#c084fc',g2:'#f0abfc',g23:'#e879f9',
  g3:'#fbbf24',g34:'#f97316',g4:'#f87171',g45:'#fb7185',g5:'#38bdf8',
  adtdeb:'#fde68a',adtg23:'#fde68a',adtg34:'#fde68a',adtg345:'#fde68a',adtg45:'#fde68a',cp:'#94a3b8'
};
const CHEVAUX_NOMS = ['Bêtise','Aloïs','Tarzan','Moon','Nora','Ambre','Marion','Coco Chanel','Palombe','Doudou','Lover','Daisy','Bacoeur','Ever','Carla','Agua','Zephiro','Bokaos','Quinola','Vidoc','Divine','Elior','Merone','Dexter','Tidjee'];

function initDB(){
  return {
    chevaux: CHEVAUX_NOMS.map((nom,i)=>({id:'ch'+i,nom})),
    cavaliers: [],
    cours:[
      {id:'c1',jour:'Lundi',debut:'19h00',duree:'1h',niveau:'adtdeb',monitrice:'Emily',cavaliers:[]},
      {id:'c2',jour:'Mardi',debut:'19h30',duree:'1h',niveau:'adtg45',monitrice:'Emily',cavaliers:[]},
      {id:'c3',jour:'Mercredi',debut:'11h00',duree:'1h',niveau:'deb',monitrice:'Dorothée',cavaliers:[]},
      {id:'c4',jour:'Mercredi',debut:'14h00',duree:'1h',niveau:'g23',monitrice:'Dorothée',cavaliers:[]},
      {id:'c5',jour:'Mercredi',debut:'15h00',duree:'1h',niveau:'g34',monitrice:'Dorothée',cavaliers:[]},
      {id:'c6',jour:'Mercredi',debut:'16h00',duree:'1h',niveau:'g45',monitrice:'Dorothée',cavaliers:[]},
      {id:'c7',jour:'Mercredi',debut:'16h00',duree:'1h',niveau:'deb',monitrice:'Dorothée',cavaliers:[]},
      {id:'c8',jour:'Mercredi',debut:'17h00',duree:'1h',niveau:'g34',monitrice:'Dorothée',cavaliers:[]},
      {id:'c9',jour:'Mercredi',debut:'18h00',duree:'1h',niveau:'g45',monitrice:'Dorothée',cavaliers:[]},
      {id:'c10',jour:'Mercredi',debut:'19h30',duree:'1h',niveau:'adtg45',monitrice:'Emily',cavaliers:[]},
      {id:'c11',jour:'Jeudi',debut:'19h30',duree:'1h',niveau:'adtg345',monitrice:'Emily',cavaliers:[]},
      {id:'c12',jour:'Samedi',debut:'9h00',duree:'1h',niveau:'g34',monitrice:'Cassandra',cavaliers:[]},
      {id:'c13',jour:'Samedi',debut:'10h00',duree:'1h',niveau:'g5',monitrice:'Cassandra',cavaliers:[]},
      {id:'c14',jour:'Samedi',debut:'11h00',duree:'1h',niveau:'g23',monitrice:'Cassandra',cavaliers:[]},
      {id:'c15',jour:'Samedi',debut:'13h30',duree:'1h',niveau:'deb',monitrice:'Dorothée',cavaliers:[]},
      {id:'c16',jour:'Samedi',debut:'14h30',duree:'1h',niveau:'g34',monitrice:'Dorothée',cavaliers:[]},
      {id:'c17',jour:'Samedi',debut:'15h30',duree:'1h',niveau:'g12',monitrice:'Dorothée',cavaliers:[]},
      {id:'c18',jour:'Samedi',debut:'16h30',duree:'1h',niveau:'g45',monitrice:'Dorothée',cavaliers:[]},
      {id:'c19',jour:'Dimanche',debut:'10h00',duree:'1h',niveau:'adtg34',monitrice:'Cassandra',cavaliers:[]},
      {id:'c20',jour:'Dimanche',debut:'11h00',duree:'1h',niveau:'adtg23',monitrice:'Cassandra',cavaliers:[]},
    ]
  };
}

function loadDB(){try{const d=JSON.parse(localStorage.getItem(KEY));if(d)return d;return initDB();}catch{return initDB();}}

// Save : écrit dans Firebase ET localStorage (fallback offline)
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(db));}catch{}
  if(window._fbSet){
    window._fbSet(db).catch(e=>toast('Erreur sync Firebase','err'));
  }
}

// Indicateur connexion
function setConnStatus(online){
  const el = document.getElementById('conn-status');
  if(!el) return;
  el.textContent = online ? '🟢 En ligne' : '🔴 Hors ligne';
  el.style.color = online ? 'var(--green)' : 'var(--red)';
}

let db = loadDB();
let mode = 'cavalier'; // par défaut côté cavalier
let view = 'mon-planning';
let selectedJour = 'Mercredi';
let montoirJour = 'Mercredi';
let selectedCavId = null;
let expandedCours = new Set();
let dragData = null;
let pendingAdminView = null;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function getNivLabel(id){const n=NIVEAUX.find(x=>x.id===id);return n?n.label:id;}
function getNivColor(id){return NIV_COLORS[id]||'#888';}
function getChevalNom(id){const c=db.chevaux.find(x=>x.id===id);return c?c.nom:'—';}
function slotToMins(s){const[h,m]=s.split('h');return parseInt(h)*60+(parseInt(m)||0);}
function dureeToMins(d){if(d==='30min')return 30;if(d==='1h')return 60;if(d==='1h30')return 90;if(d==='2h')return 120;return 60;}
function minsToSlot(m){const h=Math.floor(m/60);const mn=m%60;return`${h}h${mn===0?'00':mn}`;}
function getHeuresFin(c){return minsToSlot(slotToMins(c.debut)+dureeToMins(c.duree));}

// Label cavalier avec heure pour éviter doublons
function cavLabel(cv, coursId){
  const c = db.cours.find(x=>x.id===coursId);
  return c ? `${cv.nom||'?'} (${c.debut})` : (cv.nom||'?');
}

function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',2600);
}
function modal(title,body,btns=[]){
  document.getElementById('m-title').textContent=title;
  document.getElementById('m-body').innerHTML=body;
  document.getElementById('m-footer').innerHTML=btns.map((b,i)=>`<button class="btn ${b.cls}" id="mb${i}">${b.lbl}</button>`).join('');
  btns.forEach((b,i)=>document.getElementById('mb'+i).onclick=b.fn);
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
document.getElementById('modal-bg').onclick=e=>{if(e.target===e.currentTarget)closeModal();};

// ── MOT DE PASSE ─────────────────────────────────────────────
function askPin(targetView){
  pendingAdminView = targetView;
  document.getElementById('pin-overlay').style.display='flex';
  document.getElementById('pin-input').value='';
  document.getElementById('pin-error').textContent='';
  setTimeout(()=>document.getElementById('pin-input').focus(),100);
}
function checkPin(){
  const val = document.getElementById('pin-input').value;
  if(val === MOT_DE_PASSE){
    document.getElementById('pin-overlay').style.display='none';
    mode='admin';
    buildNav();
    go(pendingAdminView||'planning');
  } else {
    document.getElementById('pin-error').textContent='Mot de passe incorrect';
    document.getElementById('pin-input').value='';
  }
}
function cancelPin(){
  document.getElementById('pin-overlay').style.display='none';
  pendingAdminView=null;
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') cancelPin();
});

// ── NAV ──────────────────────────────────────────────────────
function buildNav(){
  const wrap = document.getElementById('nav-wrap');
  if(mode==='admin'){
    wrap.innerHTML=`
      <div class="nav-sec">Gestion</div>
      <div class="nav-item" onclick="go('planning')" id="n-planning"><span class="ni">📅</span>Planning & attribution</div>
      <div class="nav-item" onclick="go('montoir')" id="n-montoir"><span class="ni">🗓️</span>Tableau montoir</div>
      <div class="nav-item" onclick="go('chevaux')" id="n-chevaux"><span class="ni">🐎</span>Chevaux <span class="nbadge" id="nb-ch">${db.chevaux.length}</span></div>
      <div class="nav-item" onclick="go('stats')" id="n-stats"><span class="ni">📊</span>Statistiques</div>
      <div class="nav-sec">Accès</div>
      <div class="nav-item" onclick="goPublic()" id="n-public"><span class="ni">👤</span>Vue cavalier</div>
    `;
    document.getElementById('cav-picker-wrap').style.display='none';
  } else {
    wrap.innerHTML=`
      <div class="nav-sec">Mon espace</div>
      <div class="nav-item" onclick="go('mon-planning')" id="n-mon-planning"><span class="ni">📅</span>Mon planning</div>
      <div class="nav-sec">Administration</div>
      <div class="nav-item" onclick="askPin('planning')" id="n-admin-link"><span class="ni">🔐</span>Espace monitrice</div>
    `;
    document.getElementById('cav-picker-wrap').style.display='none';
  }
}

function goPublic(){
  mode='cavalier';
  buildNav();
  go('mon-planning');
}

// ── NAVIGATE ─────────────────────────────────────────────────
const TITLES={
  planning:'Planning & attribution',montoir:'Tableau montoir',
  chevaux:'Gestion des chevaux',stats:'Statistiques',
  'mon-planning':'Mon planning','mon-cheval':'Mon cheval'
};

function go(v){
  view=v;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('n-'+v);if(el)el.classList.add('active');
  document.getElementById('page-title').textContent=TITLES[v]||v;
  render();
}

function normalizeDB(){
  function toArr(v){return v?(Array.isArray(v)?v:Object.values(v)).filter(Boolean):[];}
  db.chevaux=toArr(db.chevaux);
  db.cours=toArr(db.cours);
  db.cavaliers=toArr(db.cavaliers);
  db.cours.forEach(c=>{
    if(!c) return;
    c.cavaliers=toArr(c.cavaliers);
  });
  if(!db.chevaux.length) db.chevaux=initDB().chevaux;
  if(!db.cours.length)   db.cours=initDB().cours;
}

function render(){
  normalizeDB(); // toujours normaliser avant de rendre
  const ta=document.getElementById('topbar-actions');ta.innerHTML='';
  const jt=document.getElementById('jour-tabs-wrap');jt.innerHTML='';
  const mp=document.getElementById('main-panel');
  mp.style.overflow='';mp.style.display='flex';mp.style.flexDirection='column';

  if(view==='planning'){
    ta.innerHTML=`<button class="btn btn-sec btn-sm no-print" onclick="addCours()">＋ <span class="btn-text">Cours</span></button><button class="btn btn-mg btn-sm no-print" onclick="addCavalier()">＋ <span class="btn-text">Cavalier</span></button>`;
    jt.innerHTML=renderJourTabs(selectedJour, v=>{ selectedJour=v;render(); });
    mp.innerHTML=`<div class="panel">${renderPlanning()}</div>`;
    setTimeout(bindPlanningSelects,50);
  } else if(view==='montoir'){
    ta.innerHTML=`
      <button class="btn btn-amber btn-sm no-print" onclick="resetMontoirJour()" title="Réinitialiser chevaux du jour">🔄 <span class="btn-text">Ce jour</span></button>
      <button class="btn btn-danger btn-sm no-print" onclick="clearAllMontoirJour()" title="Nouvelle semaine">↺ <span class="btn-text">Semaine</span></button>
      <button class="btn btn-green btn-sm no-print" onclick="printMontoir()" title="PDF">⬇ <span class="btn-text">PDF</span></button>`;
    jt.innerHTML=renderJourTabs(montoirJour, v=>{ montoirJour=v;render(); });
    mp.style.overflow='hidden';
    mp.style.display='flex';
    mp.style.flexDirection='column';
    mp.style.minHeight='0';
    mp.innerHTML=renderMontoirTable();
    setTimeout(bindMontoirDrag, 80);
  } else if(view==='chevaux'){
    ta.innerHTML=`<button class="btn btn-mg btn-sm no-print" onclick="addCheval()">+ Cheval</button>`;
    mp.innerHTML=`<div class="panel">${renderChevaux()}</div>`;
  } else if(view==='stats'){
    mp.innerHTML=`<div class="panel">${renderStats()}</div>`;
  } else if(view==='mon-planning'){
    mp.innerHTML=`<div class="panel">${renderMonPlanning()}</div>`;
  } else if(view==='mon-cheval'){
    mp.innerHTML=`<div class="panel">${renderMonCheval()}</div>`;
  }
  if(document.getElementById('nb-ch'))document.getElementById('nb-ch').textContent=db.chevaux.length;
}

// ── TABS RÉUTILISABLES ────────────────────────────────────────
function renderJourTabs(activeJour, onClickFn){
  // On passe la fonction via un nom global temporaire
  window._jtClick = onClickFn;
  return`<div class="jour-tabs">${JOURS.map(j=>{
    const n=db.cours.filter(c=>c.jour===j).length;
    return`<div class="jour-tab ${j===activeJour?'active':''}" onclick="window._jtClick('${j}')">
      ${j}${n?` <span class="jt-c">${n}</span>`:''}
    </div>`;
  }).join('')}</div>`;
}

// ── PLANNING ─────────────────────────────────────────────────
function renderPlanning(){
  const cours=db.cours.filter(c=>c.jour===selectedJour).sort((a,b)=>slotToMins(a.debut)-slotToMins(b.debut));
  if(!cours.length)return`<div class="empty"><div class="ei">📅</div><p>Aucun cours le ${selectedJour}<br><span style="font-size:11px;color:var(--text3);">Clique sur "+ Cours" pour en ajouter</span></p></div>`;
  return`<div class="cours-list">${cours.map(c=>renderCoursCard(c)).join('')}</div>`;
}

function renderCoursCard(c){
  const exp=expandedCours.has(c.id);
  const color=getNivColor(c.niveau);
  const nb=c.cavaliers.length;
  const nbAtt=c.cavaliers.filter(cv=>cv.chevalId&&!cv.absent).length;

        <button class="btn btn-ghost btn-xs no-print" onclick="event.stopPropagation();editCours('${c.id}')">✏️</button>
        <div class="expand-btn">${exp?'▲':'▼'}</div>
      </div>
    </div>
    ${exp?renderCavSection(c):''}
  </div>`;
}

  return`<div class="cav-section">

      ${cv.absent?`<span style="font-size:11px;color:var(--amber);font-weight:700;">ABSENT</span>`:
        `<select class="ch-sel ${cv.chevalId?'assigned':''}" id="chsel-${c.id}-${i}"

function bindPlanningSelects(){
  db.cours.forEach(c=>{
    if(!expandedCours.has(c.id))return;
    c.cavaliers.forEach((cv,i)=>{
      if(cv.absent)return;
      const sel=document.getElementById(`chsel-${c.id}-${i}`);
      if(sel&&cv.chevalId){sel.value=cv.chevalId;sel.classList.add('assigned');}
    });
  });
}

function toggleExpand(id){
  if(expandedCours.has(id))expandedCours.delete(id);
  else expandedCours.add(id);
  render();setTimeout(bindPlanningSelects,50);
}
function updateCavNom(coursId,idx,val){
  const c=db.cours.find(x=>x.id===coursId);if(!c)return;
  c.cavaliers[idx].nom=val;save();
}
function updateCavCheval(coursId,idx,chevalId){
  const c=db.cours.find(x=>x.id===coursId);if(!c)return;
  c.cavaliers[idx].chevalId=chevalId;save();
  const sel=document.getElementById(`chsel-${coursId}-${idx}`);
  if(sel)sel.classList.toggle('assigned',!!chevalId);
  toast(chevalId?`🐴 ${getChevalNom(chevalId)} → ${c.cavaliers[idx].nom||'cavalier'}`:'Cheval retiré');
}
function toggleAbsent(coursId,idx){
  const c=db.cours.find(x=>x.id===coursId);if(!c)return;
  c.cavaliers[idx].absent=!c.cavaliers[idx].absent;
  if(c.cavaliers[idx].absent)c.cavaliers[idx].chevalId='';
  save();expandedCours.add(coursId);render();setTimeout(bindPlanningSelects,50);
  toast(c.cavaliers[idx].absent?`${c.cavaliers[idx].nom||'Cavalier'} marqué absent`:'Présent ✓');
}
function addCavToCours(coursId){
  const c=db.cours.find(x=>x.id===coursId);if(!c)return;
  c.cavaliers.push({nom:'',chevalId:'',absent:false});
  save();expandedCours.add(coursId);render();
  setTimeout(()=>{
    bindPlanningSelects();
    const rows=document.querySelectorAll(`[id^="cvrow-${coursId}-"]`);
    if(rows.length){const inp=rows[rows.length-1].querySelector('input');if(inp)inp.focus();}
  },60);
}
function removeCav(coursId,idx){
  const c=db.cours.find(x=>x.id===coursId);if(!c)return;
  c.cavaliers.splice(idx,1);save();expandedCours.add(coursId);render();setTimeout(bindPlanningSelects,50);
  toast('Cavalier retiré');
}

// ── POINTER DRAG STATE ───────────────────────────────────────
let pDrag = null; // {coursId, cavIdx, ghost, lastCell}

function renderMontoirTable(){
  const cours=db.cours.filter(c=>c.jour===montoirJour).sort((a,b)=>slotToMins(a.debut)-slotToMins(b.debut));
  if(!cours.length)return`<div class="panel"><div class="empty"><div class="ei">🗓️</div><p>Aucun cours le ${montoirJour}</p></div></div>`;

  // Tranches horaires : UNE colonne par heure entière seulement
  const minH = Math.floor(Math.min(...cours.map(c=>slotToMins(c.debut)))/60)*60;
  const maxH = Math.ceil(Math.max(...cours.map(c=>slotToMins(c.debut)+dureeToMins(c.duree)))/60)*60;
  const tranches=[];
  for(let m=minH;m<maxH;m+=60) tranches.push(m);

  // Tous les chevaux
  const allChevaux=db.chevaux;

  function hJour(chId){
    return cours.reduce((s,c)=>{
      const n=c.cavaliers.filter(cv=>cv.chevalId===chId&&!cv.absent).length;
      return s+n*(dureeToMins(c.duree)/60);
    },0);
  }

  // Pour une cellule cheval×tranche (1h) : cours dont l'heure début est dans [trMin, trMin+60[
  function getCell(chId, trMin){
    const cellCours=cours.filter(c=>{
      const d=slotToMins(c.debut);
      return d>=trMin && d<trMin+60;
    });
    return cellCours.map(c=>{
      const color=getNivColor(c.niveau);
      const cavsDuCheval=c.cavaliers.map((cv,idx)=>({...cv,idx,coursId:c.id})).filter(cv=>cv.chevalId===chId);
      if(!cavsDuCheval.length)return'';
      return`<div class="m-cb" style="background:${color}18;border-color:${color}44;">
        <div class="m-cb-niv" style="color:${color};">${getNivLabel(c.niveau)} ${c.debut}</div>
        ${cavsDuCheval.map(cv=>cv.absent?
          `<span class="chip absent">✗ ${cv.nom||'?'}</span>`:
          `<span class="chip has-horse" data-cours="${cv.coursId}" data-cavidx="${cv.idx}">
            👤 ${cv.nom||'?'}
          </span>`).join('')}
        <div class="m-cb-mon">${c.monitrice}</div>
      </div>`;
    }).filter(Boolean).join('');
  }

  // Cellule "sans cheval" pour une tranche horaire
  function getSansCheval(trMin){
    const cellCours=cours.filter(c=>{
      const d=slotToMins(c.debut);
      return d>=trMin && d<trMin+60;
    });
    return cellCours.map(c=>{
      const color=getNivColor(c.niveau);
      const sans=c.cavaliers.map((cv,idx)=>({...cv,idx,coursId:c.id})).filter(cv=>!cv.chevalId&&!cv.absent);
      if(!sans.length)return'';
      return`<div class="m-cb" style="background:#1a100018;border-color:var(--amber-bg);">
        <div class="m-cb-niv" style="color:var(--amber);">${getNivLabel(c.niveau)} — ${c.debut}</div>
        ${sans.map(cv=>`<span class="chip no-horse" data-cours="${cv.coursId}" data-cavidx="${cv.idx}">
          ⚠ ${cv.nom||'?'}
        </span>`).join('')}
        <div class="m-cb-mon">${c.monitrice}</div>
      </div>`;
    }).filter(Boolean).join('');
  }

  // Date affichée
  const dateNow=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  let html=`
  <div class="print-header">
    <h2>🐴 Tableau Montoir — ${montoirJour}</h2>
    <p>Écuries des Marais · ${new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
  </div>
  <div id="montoir-scroll" style="flex:1;overflow:auto;min-height:0;">
  <table class="mt" style="border-collapse:collapse;table-layout:fixed;min-width:100%;">
  <thead><tr>
    <th class="mt-corner">🐴 Cheval<br><span style="font-weight:400;color:var(--text3);">▼ h/jour</span></th>`;

  tranches.forEach(m=>{
    const hasCours=cours.some(c=>slotToMins(c.debut)>=m&&slotToMins(c.debut)<m+60);
    html+=`<th class="mt-heure ${hasCours?'has-cours':''}">${minsToSlot(m)}</th>`;
  });
  html+=`</tr></thead><tbody>`;

  // Ligne "Sans cheval" si besoin
  const anySans=cours.some(c=>c.cavaliers.some(cv=>!cv.chevalId&&!cv.absent));
  if(anySans){
    html+=`<tr><td class="mt-cheval" style="background:var(--amber-bg);">
      <div class="cn" style="color:var(--amber);">⚠ À attribuer</div>
      <div class="ch" style="background:var(--amber-bg);color:var(--amber);">glisser ↓</div>
    </td>`;
    tranches.forEach(m=>{
      const content=getSansCheval(m);
      html+=`<td class="mt-cell ${content?'actif':''}" data-cheval="none" data-tranche="${m}">${content}</td>`;
    });
    html+=`</tr>`;
  }

  // Une ligne par cheval
  allChevaux.forEach(ch=>{
    const h=hJour(ch.id);
    const hColor=h>6?'var(--red)':h>3?'var(--amber)':'var(--green)';
    const isActif=cours.some(c=>c.cavaliers.some(cv=>cv.chevalId===ch.id));
    html+=`<tr style="${isActif?'':'opacity:0.35;'}">
      <td class="mt-cheval">
        <div class="cn">${ch.nom}</div>
        <div class="ch" style="background:${h>0?hColor+'22':'var(--bg4)'};color:${h>0?hColor:'var(--text3)'};">${h>0?h.toFixed(1)+'h':'—'}</div>
      </td>`;
    tranches.forEach(m=>{
      const content=getCell(ch.id,m);
      const cellCours=cours.filter(c=>{const d=slotToMins(c.debut);return d>=m&&d<m+60;});
      html+=`<td class="mt-cell ${cellCours.length?'actif':''}" data-cheval="${ch.id}" data-tranche="${m}">${content}</td>`;
    });
    html+=`</tr>`;
  });

  html+=`</tbody></table></div>`;

  html+=`<div class="montoir-legend no-print" style="flex-shrink:0;">
    <span style="font-size:10px;color:var(--text3);">Légende :</span>
    <span class="chip has-horse" style="cursor:default;">✓ Attribué</span>
    <span class="chip no-horse" style="cursor:default;">⚠ À attribuer — maintenir et glisser</span>
    <span class="chip absent" style="cursor:default;">✗ Absent</span>
    <span style="font-size:10px;color:var(--text3);margin-left:auto;">Maintenir appuyé sur ⚠ puis glisser vers le cheval</span>
  </div>`;

  return html;
}

function bindMontoirDrag(){
  // Nettoyer les anciens listeners
  document.querySelectorAll('.chip[data-cours]').forEach(chip=>{
    chip.onpointerdown = null;
  });

  document.querySelectorAll('.chip[data-cours]').forEach(chip=>{
    chip.addEventListener('pointerdown', startDrag);
  });
}

function startDrag(e){
  if(e.button !== 0 && e.pointerType === 'mouse') return;
  e.preventDefault();

  const chip = e.currentTarget;
  const coursId = chip.dataset.cours;
  const cavIdx = parseInt(chip.dataset.cavidx);

  // Créer le ghost
  const ghost = document.createElement('div');
  ghost.className = 'chip no-horse';
  ghost.style.cssText = `position:fixed;z-index:9999;pointer-events:none;padding:5px 10px;font-size:11px;font-weight:700;opacity:0.9;border-radius:6px;transform:translate(-50%,-50%);transition:none;white-space:nowrap;`;
  ghost.textContent = chip.textContent.trim();
  document.body.appendChild(ghost);

  // Positionner le ghost
  ghost.style.left = e.clientX + 'px';
  ghost.style.top = e.clientY + 'px';

  chip.style.opacity = '0.3';

  pDrag = { coursId, cavIdx, ghost, chip, lastCell: null, scrollInterval: null };

  document.addEventListener('pointermove', onDragMove, {passive:false});
  document.addEventListener('pointerup', onDragEnd);
  document.addEventListener('pointercancel', onDragEnd);
}

function onDragMove(e){
  if(!pDrag) return;
  e.preventDefault();

  // Déplacer le ghost
  pDrag.ghost.style.left = e.clientX + 'px';
  pDrag.ghost.style.top = e.clientY + 'px';

  // Auto-scroll du conteneur montoir
  const scrollEl = document.getElementById('montoir-scroll');
  if(scrollEl){
    const rect = scrollEl.getBoundingClientRect();
    const margin = 70;
    // Arrêter l'ancien interval
    if(pDrag.scrollInterval){ clearInterval(pDrag.scrollInterval); pDrag.scrollInterval = null; }

    if(e.clientY > rect.bottom - margin){
      pDrag.scrollInterval = setInterval(()=>{
        scrollEl.scrollTop += 12;
      }, 16);
    } else if(e.clientY < rect.top + margin){
      pDrag.scrollInterval = setInterval(()=>{
        scrollEl.scrollTop -= 12;
      }, 16);
    } else if(e.clientX > rect.right - margin){
      pDrag.scrollInterval = setInterval(()=>{
        scrollEl.scrollLeft += 12;
      }, 16);
    } else if(e.clientX < rect.left + margin){
      pDrag.scrollInterval = setInterval(()=>{
        scrollEl.scrollLeft -= 12;
      }, 16);
    }
  }

  // Trouver la cellule sous le curseur (ignorer le ghost)
  pDrag.ghost.style.display = 'none';
  const el = document.elementFromPoint(e.clientX, e.clientY);
  pDrag.ghost.style.display = '';

  // Remonter jusqu'à une mt-cell
  const cell = el ? el.closest('.mt-cell') : null;

  // Retirer le highlight de l'ancienne cellule
  if(pDrag.lastCell && pDrag.lastCell !== cell){
    pDrag.lastCell.classList.remove('drag-over');
  }

  if(cell){
    cell.classList.add('drag-over');
    pDrag.lastCell = cell;
  } else {
    pDrag.lastCell = null;
  }
}

function onDragEnd(e){
  if(!pDrag) return;

  // Nettoyer
  if(pDrag.scrollInterval){ clearInterval(pDrag.scrollInterval); pDrag.scrollInterval = null; }
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  document.removeEventListener('pointercancel', onDragEnd);

  pDrag.ghost.remove();
  pDrag.chip.style.opacity = '1';

  if(pDrag.lastCell) pDrag.lastCell.classList.remove('drag-over');

  // Drop sur une cellule ?
  pDrag.ghost.style.display = 'none';
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const cell = el ? el.closest('.mt-cell') : null;

  if(cell){
    const chevalId = cell.dataset.cheval;
    const trMin = parseInt(cell.dataset.tranche);
    const c = db.cours.find(x=>x.id===pDrag.coursId);
    const cav = c ? c.cavaliers[pDrag.cavIdx] : null;

    if(c && cav && chevalId){
      const deb=slotToMins(c.debut);
      if(trMin<=deb && deb<trMin+60){
        cav.chevalId = chevalId === 'none' ? '' : chevalId;
        save();
        const nom = chevalId==='none' ? 'retiré' : getChevalNom(chevalId);
        toast(chevalId==='none' ? 'Cheval retiré' : `🐴 ${nom} → ${cav.nom||'cavalier'}`, 'ok');
        render();
        setTimeout(bindMontoirDrag, 80);
      } else {
        toast('Ce créneau ne correspond pas à ce cours','err');
      }
    }
  }

  pDrag = null;
}

function renderChevaux(){

  ${db.chevaux.map(ch=>{
    const h=parseFloat(getHSemaine(ch.id));
    const hColor=h>6?'var(--red)':h>3?'var(--amber)':'var(--green)';
    const joursActifs=[...new Set(db.cours.filter(c=>c.cavaliers.some(cv=>cv.chevalId===ch.id)).map(c=>c.jour))];
    return`<div class="ch-list-item" onclick="editCheval('${ch.id}')">
      <div style="font-size:22px;">🐴</div>
      <div class="ch-info">
        <div class="ch-name">${ch.nom}</div>
        <div class="ch-meta">${h}h / semaine</div>
        <div class="hrs-bar"><div class="hrs-fill" style="width:${Math.min(h/15*100,100)}%;background:${hColor}"></div></div>
        <div class="ch-jours">${joursActifs.length?joursActifs.join(' · '):'Aucun cours'}</div>
      </div>
      <div style="font-size:20px;font-weight:800;font-family:'Inconsolata',monospace;color:${hColor};">${h>0?h+'h':'—'}</div>

}

function addCheval(){
  modal('Nouveau cheval',`<div class="fg"><label class="fl">Nom</label><input type="text" id="ach-n" placeholder="ex: Tornado"></div>`,
    [{lbl:'Annuler',cls:'btn-sec',fn:closeModal},
     {lbl:'Ajouter',cls:'btn-mg',fn:()=>{
       const nom=document.getElementById('ach-n').value.trim();
       if(!nom){toast('Nom requis','err');return;}
       db.chevaux.push({id:uid(),nom});save();closeModal();render();toast(nom+' ajouté','ok');

function editCheval(id){
  const ch=db.chevaux.find(x=>x.id===id);if(!ch)return;
  modal('🐴 '+ch.nom,`
    <div style="background:var(--bg3);border-radius:9px;padding:13px;margin-bottom:13px;">
      <div style="font-size:22px;font-weight:800;color:var(--mg);font-family:'Inconsolata',monospace;">${getHSemaine(id)}h<span style="font-size:13px;color:var(--text3);"> / semaine</span></div>
    </div>
    <div class="fg"><label class="fl">Nom</label><input type="text" id="ech-n" value="${ch.nom}"></div>`,
    [{lbl:'Supprimer',cls:'btn-danger',fn:()=>{if(confirm('Supprimer ?')){db.cours.forEach(c=>c.cavaliers.forEach(cv=>{if(cv.chevalId===id)cv.chevalId='';}));db.chevaux=db.chevaux.filter(x=>x.id!==id);save();closeModal();render();toast('Supprimé');}}},
     {lbl:'Annuler',cls:'btn-sec',fn:closeModal},
     {lbl:'Sauvegarder',cls:'btn-mg',fn:()=>{ch.nom=document.getElementById('ech-n').value.trim()||ch.nom;save();closeModal();render();toast('Modifié','ok');}}]);
}

// ── STATS ────────────────────────────────────────────────────
function renderStats(){
  const totalCours=db.cours.length;
  const totalCav=db.cours.reduce((s,c)=>s+c.cavaliers.length,0);
  const totalH=db.cours.reduce((s,c)=>s+c.cavaliers.filter(cv=>!cv.absent).length*(dureeToMins(c.duree)/60),0).toFixed(1);
  const nonAtt=db.cours.reduce((s,c)=>s+c.cavaliers.filter(cv=>!cv.chevalId&&!cv.absent).length,0);
  return`
  <div class="stats-grid">
    <div class="stat" style="--acc:var(--mg)"><div class="stat-v">${totalCours}</div><div class="stat-l">Cours/semaine</div></div>
    <div class="stat" style="--acc:var(--blue)"><div class="stat-v">${totalCav}</div><div class="stat-l">Élèves inscrits</div></div>
    <div class="stat" style="--acc:var(--green)"><div class="stat-v">${totalH}h</div><div class="stat-l">Heures cheval</div></div>
    <div class="stat" style="--acc:${nonAtt?'var(--amber)':'var(--green)'}"><div class="stat-v" style="color:${nonAtt?'var(--amber)':'var(--green)'};">${nonAtt}</div><div class="stat-l">Sans cheval</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
    <div>
      <div class="shd">Heures par cheval / semaine</div>
      ${[...db.chevaux].map(ch=>{
        const h=parseFloat(getHSemaine(ch.id));if(h===0)return'';
        const color=h>6?'var(--red)':h>3?'var(--amber)':'var(--green)';
        return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <div style="width:100px;font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${ch.nom}</div>
          <div style="flex:1;"><div class="hrs-bar" style="height:7px;"><div class="hrs-fill" style="width:${Math.min(h/15*100,100)}%;background:${color};"></div></div></div>
          <div style="width:34px;text-align:right;font-family:'Inconsolata',monospace;font-size:11px;font-weight:700;color:${color};">${h}h</div>
        </div>`;
      }).filter(Boolean).join('')||'<div style="color:var(--text3);font-size:12px;">Aucun cheval attribué</div>'}
    </div>
    <div>
      <div class="shd">Cours par jour</div>
      ${JOURS.map(j=>{
        const n=db.cours.filter(c=>c.jour===j).length;if(!n)return'';
        const hj=db.cours.filter(c=>c.jour===j).reduce((s,c)=>s+c.cavaliers.filter(cv=>!cv.absent).length*(dureeToMins(c.duree)/60),0).toFixed(1);
        return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <div style="width:76px;font-size:11px;font-weight:700;">${j}</div>
          <div style="flex:1;"><div class="hrs-bar" style="height:7px;"><div class="hrs-fill" style="width:${Math.min(parseFloat(hj)/20*100,100)}%;"></div></div></div>
          <div style="font-family:'Inconsolata',monospace;font-size:11px;color:var(--text2);">${n} cours · ${hj}h</div>
        </div>`;
      }).filter(Boolean).join('')}
      <div class="divider"></div>
      <div class="shd">Chevaux inactifs</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;">
        ${db.chevaux.filter(ch=>parseFloat(getHSemaine(ch.id))===0).map(ch=>`<span class="tag">${ch.nom}</span>`).join('')||'<span style="color:var(--green);font-size:12px;">Tous actifs ✓</span>'}
      </div>
    </div>
  </div>`;
}

// Plus de sélecteur de nom — le cavalier choisit son créneau, voit les gens de son cours
let selectedCoursId = null;
let selectedCavNom = null; // nom sélectionné dans la liste du cours

function renderMonPlanning(){
  normalizeDB();
  const coursDispos = db.cours
    .filter(c => c && Array.isArray(c.cavaliers) && c.cavaliers.length > 0)
    .sort((a,b) => JOURS.indexOf(a.jour) - JOURS.indexOf(b.jour) || slotToMins(a.debut) - slotToMins(b.debut));

  if(!coursDispos.length) return`<div class="empty"><div class="ei">📅</div><p>Aucun cours enregistré pour l'instant</p></div>`;

  const color = selectedCoursId ? getNivColor((db.cours.find(c=>c&&c.id===selectedCoursId)||{}).niveau||'') : 'var(--mg)';

  return`
  <div style="max-width:540px;">

    <!-- ÉTAPE 1 : choisir son créneau -->
    <div style="margin-bottom:22px;">
      <div style="font-size:18px;font-weight:800;letter-spacing:-0.02em;margin-bottom:4px;">👋 Bonjour !</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:16px;">Choisis ton heure de cours pour voir ton groupe</div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;">
        ${coursDispos.map(c=>{
          const isSelected = c.id === selectedCoursId;
          const col = getNivColor(c.niveau);
          return`<div onclick="selectedCoursId='${c.id}';selectedCavNom=null;render();"
            style="padding:12px 14px;border-radius:12px;border:2px solid ${isSelected?col:'var(--border2)'};
            background:${isSelected?col+'22':'var(--bg3)'};cursor:pointer;transition:all 0.15s;">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:${col};margin-bottom:4px;">${c.jour}</div>
            <div style="font-size:16px;font-weight:800;font-family:'Inconsolata',monospace;color:${isSelected?col:'var(--text)'};">${c.debut}</div>
            <div style="font-size:11px;color:var(--text2);margin-top:3px;">${getNivLabel(c.niveau)}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px;">👤 ${c.monitrice} · ${c.cavaliers.length} élève${c.cavaliers.length>1?'s':''}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    ${selectedCoursId ? renderCavalierCours() : ''}
  </div>`;
}

function renderCavalierCours(){
  const c = db.cours.find(x=>x.id===selectedCoursId);
  if(!c) return '';

  const color = getNivColor(c.niveau);
  const cavsPrésents = c.cavaliers.filter(cv=>!cv.absent);
  const cavsAbsents = c.cavaliers.filter(cv=>cv.absent);

  // Étape 2 : choisir son nom
  const nomSelectionné = selectedCavNom;
  const moi = nomSelectionné ? c.cavaliers.find(cv=>cv.nom===nomSelectionné) : null;
  const monCheval = moi?.chevalId ? db.chevaux.find(x=>x.id===moi.chevalId) : null;

  return`
  <!-- ÉTAPE 2 : choisir son nom dans la liste du cours -->
  <div style="margin-bottom:20px;">
    <div style="font-size:14px;font-weight:800;margin-bottom:10px;color:${color};">
      Qui es-tu dans ce cours ?
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">
      ${c.cavaliers.map((cv,i)=>`
        <div class="cav-name-btn ${cv.absent?'cav-absent':''}" data-idx="${i}" data-coursid="${c.id}"
          style="padding:10px 16px;border-radius:10px;border:2px solid ${selectedCavNom===cv.nom?color:(cv.absent?'var(--text3)':'var(--border2)')};
          background:${selectedCavNom===cv.nom?color+'22':(cv.absent?'var(--bg4)':'var(--bg3)')};
          cursor:${cv.absent?'default':'pointer'};transition:all 0.15s;
          ${cv.absent?'opacity:0.45;':''}">
          <div style="font-size:13px;font-weight:700;color:${selectedCavNom===cv.nom?color:'var(--text)'};">${cv.nom||'?'}</div>
          ${cv.absent?'<div style="font-size:10px;color:var(--amber);">Absent</div>':''}
        </div>`).join('')}
    </div>
  </div>

  ${nomSelectionné && moi ? `
  <!-- RÉSULTAT : cheval + infos cours -->
  <div style="background:var(--bg3);border:1px solid ${color}44;border-radius:var(--rl);padding:18px;margin-bottom:16px;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
      <div style="background:${color}22;border:1px solid ${color}44;border-radius:9px;padding:10px 14px;text-align:center;flex-shrink:0;">
        <div style="font-size:10px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:0.06em;">${c.jour.slice(0,3)}</div>
        <div style="font-size:16px;font-weight:800;color:${color};font-family:'Inconsolata',monospace;">${c.debut}</div>
      </div>
      <div>
        <div style="font-size:16px;font-weight:800;color:${color};">${getNivLabel(c.niveau)}</div>
        <div style="font-size:12px;color:var(--text2);">${c.debut} → ${getHeuresFin(c)} · ${c.duree} · ${c.monitrice}</div>
      </div>
    </div>

    ${moi.absent ? `
      <div style="padding:12px;background:var(--amber-bg);border-radius:9px;color:var(--amber);font-size:13px;border:1px solid #3a2000;text-align:center;">
        Tu es marqué(e) absent(e) pour ce cours
      </div>` :
    monCheval ? `
      <div style="display:flex;align-items:center;gap:14px;background:var(--bg4);border-radius:10px;padding:14px 16px;border:1px solid var(--border2);margin-bottom:10px;">
        <div style="font-size:40px;">🐴</div>
        <div>
          <div style="font-size:22px;font-weight:800;color:var(--mg);letter-spacing:-0.03em;">${monCheval.nom}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:3px;">Ton cheval pour ce cours</div>
        </div>
      </div>
      ${(()=>{
        // Trouver les cours du même jour avec ce cheval, trier par heure
        const debMins = slotToMins(c.debut);
        const finMins = debMins + dureeToMins(c.duree);
        const coursMemeJour = db.cours
          .filter(x => x.jour===c.jour && x.id!==c.id && x.cavaliers.some(cv=>cv.chevalId===monCheval.id && !cv.absent))
          .sort((a,b)=>slotToMins(a.debut)-slotToMins(b.debut));
        const avant = coursMemeJour.filter(x => slotToMins(x.debut)+dureeToMins(x.duree) <= debMins+5);
        const apres = coursMemeJour.filter(x => slotToMins(x.debut) >= finMins-5);
        const dernierAvant = avant.length ? avant[avant.length-1] : null;
        const premierApres = apres.length ? apres[0] : null;
        let infos = '';
        if(dernierAvant){
          infos += `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border2);margin-bottom:6px;">
            <span style="font-size:16px;">⬆️</span>
            <div>
              <div style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;">Monté avant toi</div>
              <div style="font-size:12px;font-weight:700;">${getNivLabel(dernierAvant.niveau)} — ${dernierAvant.debut} → ${getHeuresFin(dernierAvant)}</div>
            </div>
          </div>`;
        }
        if(premierApres){
          infos += `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border-radius:8px;border:1px solid var(--border2);">
            <span style="font-size:16px;">⬇️</span>
            <div>
              <div style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;">Monté après toi</div>
              <div style="font-size:12px;font-weight:700;">${getNivLabel(premierApres.niveau)} — ${premierApres.debut} → ${getHeuresFin(premierApres)}</div>
            </div>
          </div>`;
        }
        if(!dernierAvant && !premierApres){
          infos = `<div style="font-size:11px;color:var(--text3);padding:6px 0;">Pas d'autre cours avec ${monCheval.nom} ce jour.</div>`;
        }
        return infos;
      })()}` : `
      <div style="padding:12px 14px;background:var(--amber-bg);border-radius:9px;color:var(--amber);font-size:13px;border:1px solid #3a2000;text-align:center;">
        ⏳ Cheval pas encore attribué — reviens plus tard
      </div>`}
  </div>

  <!-- LES AUTRES CAVALIERS DU COURS -->
  <div style="font-size:13px;font-weight:800;margin-bottom:10px;">Les autres cavaliers du cours</div>
  <div style="display:flex;flex-direction:column;gap:6px;">
    ${c.cavaliers.filter(cv=>cv.nom!==nomSelectionné).map(cv=>{
      const cheval = cv.chevalId ? db.chevaux.find(x=>x.id===cv.chevalId) : null;
      return`<div style="display:flex;align-items:center;gap:12px;padding:10px 13px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--border2);${cv.absent?'opacity:0.4;':''}">
        <div style="width:28px;height:28px;border-radius:50%;background:var(--vi);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;">${(cv.nom||'?').slice(0,1).toUpperCase()}</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:700;${cv.absent?'text-decoration:line-through;color:var(--text3);':''}">
            ${cv.nom||'?'} ${cv.absent?'<span style="font-size:10px;color:var(--amber);">(absent)</span>':''}
          </div>
        </div>
        <div style="font-size:12px;font-weight:700;color:${cheval?'var(--mg)':'var(--text3)'};">
          ${cheval?'🐴 '+cheval.nom:'—'}
        </div>
      </div>`;
    }).join('')}
  </div>` : ''}`;
}

        <div style="font-size:24px;font-weight:800;color:var(--mg);letter-spacing:-0.04em;">${cheval.nom}</div>

// Listener délégué pour les clics sur noms de cavaliers (vue publique)
document.addEventListener('click', e=>{
  const btn = e.target.closest('.cav-name-btn');
  if(!btn || btn.classList.contains('cav-absent')) return;
  const coursId = btn.dataset.coursid;
  const idx = parseInt(btn.dataset.idx);
  const c = db.cours.find(x=>x.id===coursId);
  if(!c) return;
  const cv = c.cavaliers[idx];
  if(!cv || cv.absent) return;
  selectedCavNom = cv.nom;
  selectedCoursId = coursId;
  render();
});

// Démarrage : afficher loading puis brancher Firebase
document.getElementById('main-panel').innerHTML = `
  <div style="display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:16px;">
    <div style="font-size:36px;animation:spin 1s linear infinite;">🐴</div>
    <div style="font-size:14px;color:var(--text2);font-weight:600;">Connexion en cours...</div>
    <div style="font-size:11px;color:var(--text3);">Connexion à la base de données partagée</div>
    <button onclick="skipFirebase()" class="btn btn-sec btn-sm" style="margin-top:8px;">
      Utiliser sans connexion →
    </button>
  </div>`;

let fbConnected = false;
let fbTimeoutId = null;

function skipFirebase(){
  if(fbTimeoutId) clearTimeout(fbTimeoutId);
  toast('Mode local activé','err');
  setConnStatus(false);
  db = loadDB();
  buildNav();
  go('mon-planning');
}

// Timeout 5s
const fbTimeout = setTimeout(()=>{ if(!fbConnected) skipFirebase(); }, 5000);
fbTimeoutId = fbTimeout;

try {
  window._fbOnValue(snapshot => {
    clearTimeout(fbTimeout);
    fbConnected = true;
    const data = snapshot.val();
    if(data && (data.cours || data.chevaux)){
      db = data;
      // Firebase convertit les arrays en objets numérotés — on normalise tout
      function toArr(v){ return v ? (Array.isArray(v) ? v : Object.values(v)) : []; }
      db.chevaux   = toArr(db.chevaux).filter(Boolean);
      db.cours     = toArr(db.cours).filter(Boolean);
      db.cavaliers = toArr(db.cavaliers).filter(Boolean);
      db.cours.forEach(c => {
        if(c) c.cavaliers = toArr(c.cavaliers).filter(Boolean);
      });
      if(!db.chevaux.length) db.chevaux = initDB().chevaux;
      if(!db.cours.length)   db.cours   = initDB().cours;
      try{localStorage.setItem(KEY, JSON.stringify(db));}catch{}
    } else {
      // Base vide — injecter les données initiales
      db = initDB();
      try{localStorage.setItem(KEY, JSON.stringify(db));}catch{}
      window._fbSet(db).then(()=>{
        toast('Données initiales chargées ✓','ok');
      }).catch(e=>{
        toast('Erreur écriture Firebase','err');
      });
    }
    setConnStatus(true);
    // Toujours rebuilder la nav et render
    buildNav();
    go(view || 'mon-planning');
  });
} catch(e) {
  clearTimeout(fbTimeout);
  toast('Firebase indisponible — mode local', 'err');
  setConnStatus(false);
  db = loadDB();
  buildNav();
  go('mon-planning');
}

window.addEventListener('online', ()=>{
  setConnStatus(true);
  // Reconnecter Firebase si on revient en ligne
  if(window._fbOnValue) fbDB.goOnline();
});
window.addEventListener('offline', ()=>setConnStatus(false));
</script>
</body>
</html>
